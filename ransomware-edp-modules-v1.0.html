<!DOCTYPE html>
<html lang="en">
<head>

<title>EDP Module Intelligence | The Observatory</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;overflow:hidden;}body{height:100%;overflow:hidden;display:flex;flex-direction:column;background:#070b16;font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;color:#c0cfe0;}

/* ── HEADER ─────────────────────────────── */
#obsbar{display:flex;align-items:center;gap:14px;padding:5px 20px;background:#060d1a;border-bottom:1px solid #1a2a44;font-size:9.5px;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;}
#obsbar a{color:#3a5878;text-decoration:none;transition:color .15s;}
#obsbar a:hover{color:#5a9acc;}
#obsbar .ob-brand{color:#5a9acc;font-weight:700;}
#header{padding:8px 20px 6px;border-bottom:1px solid #1a2a44;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;}
#header h1{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#5a9acc;}
#header .sub{font-size:9px;color:#3a5878;margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}

/* ── CONTROLS ────────────────────────────── */
#controls{padding:5px 20px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;border-bottom:1px solid #0f1a30;flex-shrink:0;background:#060d1a;}
.ctrl-label{font-size:9.5px;color:#607898;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;}
.ctrl-sep{width:1px;height:14px;background:#1a2a42;margin:0 4px;}
.fbtn{padding:3px 10px;border-radius:3px;border:1px solid;background:transparent;font-size:9.5px;cursor:pointer;font-family:inherit;color:#a8bdd6;border-color:#2a3a58;transition:all 100ms;}
.fbtn:hover{background:rgba(255,255,255,0.05);}
.fbtn.on{background:rgba(255,255,255,0.09);}
.phase-A{border-color:#a0700a80!important;color:#c8a040;}
.phase-A.on{background:rgba(160,112,10,0.18)!important;}
.phase-B{border-color:#3a6ca880!important;color:#7aaad8;}
.phase-B.on{background:rgba(58,108,168,0.18)!important;}
.phase-C{border-color:#a0402080!important;color:#d08060;}
.phase-C.on{background:rgba(160,64,32,0.18)!important;}

/* ── LAYOUT ──────────────────────────────── */
#app{display:flex;flex:1 1 0;min-height:0;overflow:hidden;}

/* ── LEFT PANEL: MODULE LIST ─────────────── */
#mod-list{width:300px;flex-shrink:0;overflow-y:auto;border-right:1px solid #0f1a30;background:#06101c;}
#mod-list-header{padding:8px 14px 6px;border-bottom:1px solid #0f1a30;font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:#3a5878;}

.mod-row{padding:8px 14px;border-bottom:1px solid #0a1626;cursor:pointer;transition:background 80ms;display:flex;align-items:flex-start;gap:8px;}
.mod-row:hover{background:#0c1828;}
.mod-row.active{background:#0f1e30;border-left:2px solid #5a9acc;}
.mod-num{font-size:9px;color:#3a5878;font-weight:700;flex-shrink:0;margin-top:2px;width:18px;}
.mod-info{flex:1;min-width:0;}
.mod-name{font-size:11px;font-weight:600;color:#c0d8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mod-sub{font-size:9px;color:#4a6888;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mod-badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
.badge{font-size:8px;padding:1px 5px;border-radius:2px;border:1px solid;letter-spacing:.6px;text-transform:uppercase;white-space:nowrap;}
.badge-A{border-color:#a0700a60;color:#c8a040;background:rgba(160,112,10,0.1);}
.badge-B{border-color:#3a6ca860;color:#7aaad8;background:rgba(58,108,168,0.1);}
.badge-C{border-color:#a0402060;color:#d08060;background:rgba(160,64,32,0.1);}
.badge-Cross{border-color:#5a4a7860;color:#a898c8;background:rgba(90,74,120,0.1);}
.badge-CRITICAL{border-color:#c8302060;color:#e08070;background:rgba(200,48,32,0.12);}
.badge-HIGH{border-color:#c8a01060;color:#d4b060;background:rgba(200,160,16,0.1);}
.badge-MEDIUM{border-color:#3a6ca860;color:#80b0d8;background:rgba(58,108,168,0.1);}
.badge-LOW{border-color:#3a7a4a60;color:#70b880;background:rgba(58,122,74,0.1);}

/* filter dimming */
.mod-row.phase-dim{opacity:0.18;}

/* ── RIGHT PANEL: DETAIL ─────────────────── */
#detail{flex:1 1 0;overflow-y:auto;padding:0;min-width:0;min-height:0;display:flex;flex-direction:column;}
#detail-empty{display:flex;align-items:center;justify-content:center;flex:1;color:#2a4a68;font-size:12px;letter-spacing:1px;text-transform:uppercase;}

/* ── DETAIL HEADER ───────────────────────── */
#det-header{padding:10px 18px 8px;border-bottom:1px solid #0f1a30;background:#08101d;flex-shrink:0;}
#det-num{font-size:9px;color:#3a5878;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;}
#det-title{font-size:18px;font-weight:700;color:#d6e5f4;line-height:1.2;}
#det-subtitle{font-size:12px;color:#4a6888;margin-top:3px;}
#det-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.det-badge{font-size:9.5px;padding:3px 9px;border-radius:3px;border:1px solid;letter-spacing:.8px;text-transform:uppercase;}

/* ── DETAIL SECTIONS ─────────────────────── */
#det-body{padding:12px 18px;display:flex;flex-direction:column;gap:12px;flex:1 1 0;min-height:0;overflow-y:auto;}
.det-section{background:#0c1524;border:1px solid #1a2a44;border-radius:5px;padding:10px 12px;}
.det-sec-label{font-size:8.5px;text-transform:uppercase;letter-spacing:1.2px;color:#3a5878;margin-bottom:7px;font-weight:700;}
.det-sec-title{font-size:13px;font-weight:700;color:#5a9acc;margin-bottom:10px;}

/* ── DEPENDENCY FLOW ─────────────────────── */
#dep-flow{display:flex;align-items:stretch;gap:0;min-height:100px;}
.dep-col{display:flex;flex-direction:column;gap:6px;justify-content:center;}
.dep-col-label{font-size:8.5px;text-transform:uppercase;letter-spacing:1px;color:#3a5878;margin-bottom:6px;text-align:center;}
.dep-col.left{align-items:flex-end;flex:1;}
.dep-col.center{align-items:center;justify-content:center;padding:0 12px;flex-shrink:0;}
.dep-col.right{align-items:flex-start;flex:1;}
.dep-center-node{background:rgba(90,154,204,0.15);border:2px solid #5a9acc;border-radius:5px;padding:8px 12px;text-align:center;font-size:11px;font-weight:700;color:#9ac8e8;}
.dep-item-pill{font-size:10px;background:#0a1828;border:1px solid #1a3050;border-radius:3px;padding:4px 8px;color:#7aaac8;cursor:pointer;text-align:center;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis;transition:border-color 100ms;}
.dep-item-pill:hover{border-color:#5a9acc;color:#c0d8f0;}
.dep-arrows{display:flex;flex-direction:column;justify-content:center;gap:4px;align-items:center;padding:0 4px;}
svg.flow-arrow{overflow:visible;}

/* ── ACTOR GRID ──────────────────────────── */
#actor-grid{display:flex;flex-wrap:wrap;gap:7px;}
.actor-pill{font-size:10px;padding:4px 9px;border-radius:3px;border:1px solid;white-space:nowrap;}
.actor-named{border-color:#5a7a9a60;color:#9ab8d4;background:rgba(90,122,154,0.1);}
.actor-sanctioned{border-color:#c8302060;color:#e08878;background:rgba(200,48,32,0.12);}
.actor-disrupted{border-color:#a0700a60;color:#c8a040;background:rgba(160,112,10,0.1);}
.actor-active{border-color:#3a7a4a60;color:#70b880;background:rgba(58,122,74,0.1);}
.actor-legend{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.actor-legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:#4a6888;}
.actor-legend-dot{width:8px;height:8px;border-radius:2px;border:1px solid;}

/* ── TIMELINE ────────────────────────────── */
#timeline-wrap{position:relative;padding:10px 0 4px;}
#timeline-line{height:2px;background:#1a2a44;border-radius:1px;position:relative;margin:0 8px;}
.tl-events{position:relative;height:0;}
.tl-event{position:absolute;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;cursor:default;}
.tl-dot{width:11px;height:11px;border-radius:50%;border:2px solid;margin-top:-6px;flex-shrink:0;position:relative;z-index:2;}
.tl-label{font-size:8.5px;text-align:center;max-width:90px;color:#5a7898;margin-top:5px;line-height:1.3;}
.tl-year{font-size:10px;font-weight:700;color:#3a5878;margin-top:2px;}
.tl-LE .tl-dot{background:#5a1818;border-color:#c83020;}
.tl-Market .tl-dot{background:#5a4208;border-color:#c8a020;}
.tl-Reconstitution .tl-dot{background:#0c3050;border-color:#3a80c8;}
.tl-Designation .tl-dot{background:#3a1858;border-color:#9a50d0;}
#timeline-axis{display:flex;justify-content:space-between;padding:0 8px;margin-top:60px;font-size:9px;color:#2a4060;}

/* ── LEVERAGE BOX ────────────────────────── */
.leverage-box{background:#0a1c30;border:1px solid #1a3a60;border-left:3px solid #5a9acc;border-radius:3px;padding:9px 12px;}
.leverage-label{font-size:8.5px;text-transform:uppercase;letter-spacing:1.2px;color:#2e5070;margin-bottom:6px;font-weight:700;}
.leverage-text{font-size:12px;color:#8aaac0;line-height:1.62;}

/* ── SANKEY / FLOW (financial modules) ───── */
.sankey-wrap{overflow:hidden;}
svg.sankey{display:block;}

/* ── MATRIX VIEW ──────────────────────────── */
#matrix-view{padding:16px 24px;display:none;}
#matrix-view.visible{display:block;}
.matrix-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:#3a5878;margin-bottom:12px;}
table.matrix{width:100%;border-collapse:collapse;font-size:10.5px;}
table.matrix th{padding:6px 10px;text-align:center;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#5a7898;background:#0a1420;border:1px solid #1a2a3a;font-weight:600;}
table.matrix th.left{text-align:left;}
table.matrix td{padding:6px 10px;border:1px solid #0f1e30;text-align:center;cursor:pointer;transition:background 80ms;}
table.matrix td.mod-cell{text-align:left;font-weight:600;color:#9ab8d4;}
table.matrix tr:hover td{background:#0e1c2e!important;}
.cell-critical{background:rgba(200,48,32,0.18);color:#e08070;}
.cell-high{background:rgba(200,160,16,0.15);color:#d4b060;}
.cell-medium{background:rgba(58,108,168,0.15);color:#80b0d8;}
.cell-low{background:rgba(58,122,74,0.12);color:#70b880;}
.cell-na{color:#2a4060;}


/* ── OWNERSHIP TABLE ─────────────────────── */
.own-table{width:100%;border-collapse:collapse;font-size:10px;}
.own-table th{padding:5px 8px;text-align:left;font-size:8.5px;text-transform:uppercase;letter-spacing:1px;color:#3a5878;background:#080f1c;border-bottom:1px solid #1a2a3a;}
.own-table td{padding:5px 8px;border-bottom:1px solid #0d1a2e;color:#8aaac0;vertical-align:top;}
.own-table td:first-child{color:#c0d8f0;font-weight:600;white-space:nowrap;}
/* ── COMPOUND / INDICATOR LIST ───────────── */
.item-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:5px;}
.item-list li{font-size:10.5px;color:#8aaac0;line-height:1.5;padding-left:12px;position:relative;}
.item-list li::before{content:'›';position:absolute;left:0;color:#3a6a9a;font-weight:700;}
/* ── FINANCIAL BOX ───────────────────────── */
.fin-box{background:#070e1d;border:1px solid #2a3a18;border-left:3px solid #c8a040;border-radius:4px;padding:12px 14px;height:100%;}
.fin-label{font-size:8.5px;text-transform:uppercase;letter-spacing:1.2px;color:#7a6030;margin-bottom:8px;font-weight:700;}
.fin-text{font-size:11.5px;color:#a09060;line-height:1.65;}

/* ── DEFINITION SECTION ──────────────────── */
.def-text{font-size:11.5px;color:#8aaac0;line-height:1.65;margin:0;}
/* ── INFLUENCE COLUMNS ───────────────────── */
.det-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
@media(max-width:1100px){.det-3col{grid-template-columns:1fr 1fr;}}
.inf-west{border-left:3px solid #3a6ca8!important;}
.inf-east{border-left:3px solid #c83020!important;}
.inf-evo{border-left:3px solid #6a5a9a!important;}
.inf-label{font-size:8px;text-transform:uppercase;letter-spacing:1.2px;font-weight:700;margin-bottom:7px;}
.inf-label-west{color:#4a7ab8;}
.inf-label-east{color:#a04030;}
.inf-label-evo{color:#5a4a8a;}
.inf-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:4px;}
.inf-list li{font-size:10.5px;color:#8aaac0;line-height:1.45;padding-left:10px;position:relative;}
.inf-list li::before{content:'›';position:absolute;left:0;font-weight:700;}
.inf-list-west li::before{color:#3a6ca8;}
.inf-list-east li::before{color:#c83020;}
.inf-list-evo li::before{color:#6a5a9a;}
/* ── COMPACT DEP FLOW ────────────────────── */
.dep-compact{display:flex;align-items:center;flex-wrap:wrap;gap:5px;padding:4px 0;}
.dep-node{font-size:9.5px;padding:3px 8px;border-radius:3px;border:1px solid #1a3050;background:#0a1828;color:#7aaac8;white-space:nowrap;}
.dep-arrow{color:#2a4a68;font-size:12px;flex-shrink:0;}
.dep-center-pill{font-size:10px;font-weight:700;padding:4px 10px;border-radius:3px;border:2px solid #5a9acc;background:rgba(90,154,204,0.12);color:#9ac8e8;white-space:nowrap;}
/* ── SCROLLBAR ───────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#060d1a;}
::-webkit-scrollbar-thumb{background:#1a2a44;border-radius:2px;}

/* ── VIEW TOGGLE ──────────────────────────── */
.view-btn{padding:3px 10px;border-radius:3px;border:1px solid #2a3a58;background:transparent;font-size:9.5px;cursor:pointer;font-family:inherit;color:#6a8aaa;}
.view-btn:hover{background:rgba(255,255,255,0.05);}
.view-btn.on{background:rgba(90,154,204,0.15);border-color:#5a9acc;color:#9ac8e8;}

/* ── TOOLTIP ──────────────────────────────── */
#tt{position:fixed;background:#0c1524;border:1px solid #1c3258;border-left:3px solid #5a9acc;border-radius:4px;padding:9px 12px;max-width:260px;font-size:10.5px;pointer-events:none;display:none;z-index:9999;line-height:1.55;box-shadow:0 4px 20px rgba(0,0,0,.7);}
#tt h4{font-size:11px;margin-bottom:3px;color:#c0d8f0;}
#tt p{color:#7aaac0;}

/* ── DETAIL 2-COL ───────────────────────── */
.det-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:900px){.det-2col{grid-template-columns:1fr;}}

/* ── KPI STRIP ──────────────────────────── */
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:0;}
.kpi-card{background:#080f1c;border:1px solid #1a2a3a;border-radius:3px;padding:6px 8px;}
.kpi-label{font-size:8.5px;text-transform:uppercase;letter-spacing:1px;color:#3a5878;margin-bottom:4px;}
.kpi-val{font-size:16px;font-weight:700;}
</style>
</head>

// ════════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════════
let selectedMod = null;
let activePhases = new Set();
let activeTiers = new Set();
let currentView = 'detail';

// ════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════
function init() {
  buildModList();
  buildMatrix();
}

// ════════════════════════════════════════════════════════════════════
// MODULE LIST
// ════════════════════════════════════════════════════════════════════
function buildModList() {
  const container = document.getElementById('mod-rows');
  container.innerHTML = '';
  MODS.forEach(m => {
    const row = document.createElement('div');
    row.className = 'mod-row';
    row.id = `mrow-${m.id}`;
    row.onclick = () => selectMod(m.id);
    row.innerHTML = `
      <div class="mod-num">${String(m.id).padStart(2,'0')}</div>
      <div class="mod-info">
        <div class="mod-name">${m.name}</div>
        <div class="mod-sub">${m.subtitle}</div>
        <div class="mod-badges">
          <span class="badge badge-${m.phase}">${m.phase === 'Cross' ? 'Cross-Cut' : 'Phase ' + m.phase}</span>
          <span class="badge badge-${m.tier}">${m.tier}</span>
        </div>
      </div>`;
    container.appendChild(row);
  });
}

// ════════════════════════════════════════════════════════════════════
// FILTERS
// ════════════════════════════════════════════════════════════════════
function togglePhase(p) {
  const btn = document.getElementById(`f-${p}`);
  if (activePhases.has(p)) { activePhases.delete(p); btn.classList.remove('on'); }
  else { activePhases.add(p); btn.classList.add('on'); }
  applyFilters();
}
function toggleTier(t) {
  const btn = document.getElementById(`f-${t}`);
  if (activeTiers.has(t)) { activeTiers.delete(t); btn.classList.remove('on'); }
  else { activeTiers.add(t); btn.classList.add('on'); }
  applyFilters();
}
function resetFilters() {
  activePhases.clear(); activeTiers.clear();
  ['A','B','C','Cross','CRITICAL','HIGH','MEDIUM'].forEach(x => {
    const b = document.getElementById(`f-${x}`);
    if(b) b.classList.remove('on');
  });
  applyFilters();
}
function applyFilters() {
  MODS.forEach(m => {
    const row = document.getElementById(`mrow-${m.id}`);
    let show = true;
    if (activePhases.size > 0 && !activePhases.has(m.phase)) show = false;
    if (activeTiers.size > 0 && !activeTiers.has(m.tier)) show = false;
    row.classList.toggle('phase-dim', !show);
  });
}

// ════════════════════════════════════════════════════════════════════
// VIEW TOGGLE
// ════════════════════════════════════════════════════════════════════
function setView(v) {
  currentView = v;
  document.getElementById('btn-detail').classList.toggle('on', v === 'detail');
  document.getElementById('btn-matrix').classList.toggle('on', v === 'matrix');
  const mv = document.getElementById('matrix-view');
  if (v === 'matrix') {
    document.getElementById('detail-empty').style.display = 'none';
    document.getElementById('det-header').style.display = 'none';
    document.getElementById('det-body').style.display = 'none';
    mv.classList.add('visible');
  } else {
    mv.classList.remove('visible');
    if (selectedMod) {
      document.getElementById('det-header').style.display = '';
      document.getElementById('det-body').style.display = '';
    } else {
      document.getElementById('detail-empty').style.display = '';
    }
  }
}

// ════════════════════════════════════════════════════════════════════
// SELECT MODULE
// ════════════════════════════════════════════════════════════════════
function selectMod(id) {
  selectedMod = id;
  if (currentView === 'matrix') setView('detail');
  MODS.forEach(m => document.getElementById(`mrow-${m.id}`).classList.toggle('active', m.id === id));
  const m = MODS.find(x => x.id === id);
  renderDetail(m);
}

function navigateMod(dir) {
  if (!selectedMod) return;
  const idx = MODS.findIndex(x => x.id === selectedMod);
  const next = MODS[idx + dir];
  if (next) selectMod(next.id);
}

// ════════════════════════════════════════════════════════════════════
// RENDER DETAIL
// ════════════════════════════════════════════════════════════════════
function phaseColor(p) {
  if (p === 'A') return '#c8a040';
  if (p === 'B') return '#7aaad8';
  if (p === 'C') return '#d08060';
  return '#a898c8';
}
function tierColor(t) {
  if (t === 'CRITICAL') return '#e08070';
  if (t === 'HIGH') return '#d4b060';
  if (t === 'MEDIUM') return '#80b0d8';
  return '#70b880';
}
function durColor(d) {
  if (d.startsWith('LOW')) return '#70b880';
  if (d.startsWith('HIGH')) return '#e08070';
  return '#d4b060';
}
function rdColor(d) {
  if (d.startsWith('LOW')) return '#70b880';
  if (d.startsWith('HIGH')) return '#e08070';
  return '#d4b060';
}
function actorClass(s) {
  if (s === 'sanctioned' || s === 'disrupted') return 'actor-disrupted';
  if (s === 'sanctioned') return 'actor-sanctioned';
  if (s === 'active') return 'actor-active';
  return 'actor-named';
}
function actorLabel(s) {
  if (s === 'sanctioned') return 'SANCTIONED';
  if (s === 'disrupted') return 'DISRUPTED/SEIZED';
  if (s === 'active') return 'ACTIVE';
  return '';
}

function renderDetail(m) {
  document.getElementById('detail-empty').style.display = 'none';
  // Header

  hdr.style.display = '';
  hdr.innerHTML = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;">

        <div id="det-title">${m.name}</div>

          <span class="det-badge badge-${m.phase}" style="color:${phaseColor(m.phase)};border-color:${phaseColor(m.phase)}60;">${m.phase === 'Cross' ? 'Cross-Cutting' : 'Phase ' + m.phase}</span>

        <button onclick="navigateMod(-1)" style="padding:4px 10px;border-radius:3px;border:1px solid #1a3050;background:transparent;color:#6a8aaa;font-size:11px;cursor:pointer;">&#8592; Prev</button>
        <button onclick="navigateMod(1)" style="padding:4px 10px;border-radius:3px;border:1px solid #1a3050;background:transparent;color:#6a8aaa;font-size:11px;cursor:pointer;">Next &#8594;</button>
      </div>
    </div>`;

  // Body
  const body = document.getElementById('det-body');
  body.style.display = '';
  body.innerHTML = '';

  // KPI Strip
  const kpiDiv = document.createElement('div');
  kpiDiv.className = 'kpi-strip';
  const fcRaw = m.financialCentrality || '';
  const fcColor = fcRaw.includes('CRITICAL') ? '#e08070' : fcRaw.includes('HIGH') ? '#d4b060' : fcRaw.includes('MEDIUM') ? '#80b0d8' : '#70b880';
  const fcDisp = fcRaw.replace(/ \(.*?\)/g,'').substring(0,18);
  kpiDiv.innerHTML = `
    <div class="kpi-card"><div class="kpi-label">Phase</div><div class="kpi-val" style="color:${phaseColor(m.phase)};font-size:18px;">${m.phase === 'Cross' ? 'Cross-Cut' : 'Phase ' + m.phase}</div></div>
    <div class="kpi-card"><div class="kpi-label">Tier</div><div class="kpi-val" style="color:${tierColor(m.tier)};font-size:18px;">${m.tier}</div></div>
    <div class="kpi-card"><div class="kpi-label">Disruption Durability</div><div class="kpi-val" style="color:${durColor(m.durability)};font-size:14px;margin-top:2px;">${m.durability}</div></div>
    <div class="kpi-card"><div class="kpi-label">Reconstitution</div><div class="kpi-val" style="color:#9ab8d4;font-size:11px;margin-top:4px;line-height:1.3;">${m.reconSpeed}</div></div>
    <div class="kpi-card"><div class="kpi-label">Financial Centrality</div><div class="kpi-val" style="color:${fcColor};font-size:13px;margin-top:2px;">${fcDisp}</div></div>`;
  body.appendChild(kpiDiv);

  // Definition section
  const defd = MOD_DETAIL[m.id] || {};
  if (defd.definition) {
    const defSec = document.createElement('div');
    defSec.className = 'det-section';
    defSec.innerHTML = `<div class="det-sec-label">What It Is</div><p class="def-text">${defd.definition}</p>`;
    body.appendChild(defSec);
  }

  // Compact dependency flow
  const depSec = document.createElement('div');
  depSec.className = 'det-section';
  let depHtml = '<div class="det-sec-label">Ecosystem Position</div><div class="dep-compact">';
  depHtml += '<span style="font-size:8px;color:#3a5878;text-transform:uppercase;letter-spacing:.8px;flex-shrink:0;">Upstream:</span>';
  m.upstream.forEach(u => { depHtml += `<span class="dep-node">${u}</span>`; });
  depHtml += `<span class="dep-arrow">&#8594;</span><span class="dep-center-pill">${String(m.id).padStart(2,'0')} ${m.name}</span><span class="dep-arrow">&#8594;</span>`;

  body.appendChild(depSec);

  // Western / Russian / Evolution 3-col
  if (defd.western || defd.russian || defd.evolution) {
    const tc3i = document.createElement('div');
    tc3i.className = 'det-3col';

    if (defd.western) {

      wSec.className = 'det-section inf-west';
      let wHtml = '<div class="inf-label inf-label-west">&#9656; Western Influence Levers</div><ul class="inf-list inf-list-west">';
      defd.western.forEach(w => { wHtml += `<li>${w}</li>`; });
      wHtml += '</ul>';

  twoCol.appendChild(actorSec);

  // LE Actions / Timeline (vertical list in this col)
  const leSec = document.createElement('div');

  leSec.style.overflowY = 'auto';
  leSec.innerHTML = `<div class="det-sec-label">Enforcement and Market Events</div>`;
  m.timeline.forEach(ev => {

      <div style="font-size:9.5px;color:#4a6888;font-style:italic;">${ev.outcome}</div>`;
    leSec.appendChild(evDiv);

  twoCol.appendChild(leSec);
  body.appendChild(twoCol);

  // Leverage Box
  const levSec = document.createElement('div');
  levSec.innerHTML = `
    <div class="leverage-box">
      <div class="leverage-label">&#9650; Disruption Leverage Assessment</div>

  body.appendChild(levSec);

  // Ownership + Compounding 2-col
  const ex = MOD_EXTRA[m.id] || {};
  if (ex.ownership || ex.compounding) {

    if (ex.ownership && ex.ownership.length) {

      ex.ownership.forEach(o => {
        const pc = o.priority==='CRITICAL'?'cell-critical':o.priority==='HIGH'?'cell-high':o.priority==='MEDIUM'?'cell-medium':'cell-low';
        ownHtml += `<tr><td>${o.owner}</td><td style="color:#6a8aaa;font-size:9.5px;">${o.action}</td><td class="${pc}" style="white-space:nowrap;">${o.priority}</td></tr>`;

    if (ex.compounding && ex.compounding.length) {

      tc2.appendChild(compSec);

  // Indicators + Financial Context 2-col
  const tc3 = document.createElement('div');

  if (ex.indicators && ex.indicators.length) {

    indHtml += '</ul>';

    tc3.appendChild(indSec);

  const finSec = document.createElement('div');
  finSec.className = 'det-section';
  finSec.style.display = 'flex';
  finSec.style.flexDirection = 'column';

      <div class="fin-label">&#36; Financial Context</div>

  tc3.appendChild(finSec);
  body.appendChild(tc3);

  // scroll top
  document.getElementById('detail').scrollTop = 0;
}

// BUILD MATRIX
// ════════════════════════════════════════════════════════════════════
function buildMatrix() {
  const mv = document.getElementById('matrix-view');
  const dims = [
    {key:'phase', label:'Phase'},
    {key:'tier', label:'Tier'},
    {key:'replaceDiff', label:'Replace Difficulty'},
    {key:'durability', label:'Disruption Durability'},
    {key:'reconSpeed', label:'Reconstitution Speed'},
    {key:'leActions', label:'LE Actions To Date'},
    {key:'financialCentrality', label:'Financial Centrality'},
  ];
  let html = `<div class="matrix-title">Cross-Module Comparison Matrix — Click any row to view module detail</div>
  <table class="matrix"><thead><tr>
    <th class="left" style="min-width:130px;">Module</th>
    ${dims.map(d => `<th>${d.label}</th>`).join('')}
  </tr></thead><tbody>`;

  MODS.forEach(m => {
    const cells = dims.map(d => {
      const v = m[d.key] || '';
      let cls = '';
      const vl = v.toUpperCase();
      if (vl.includes('CRITICAL')) cls = 'cell-critical';
      else if (vl.includes('HIGH') && !vl.includes('VERY')) cls = 'cell-high';
      else if (vl.includes('MEDIUM')) cls = 'cell-medium';
      else if (vl.includes('LOW') || vl.includes('FAST')) cls = 'cell-low';
      else cls = 'cell-na';
      // shorten for display
      let disp = v.replace(' (months)','').replace(' (weeks)','').replace(' (trust-dependent; not just infrastructure)','').replace(' (no major LE action documented)','').replace(' (no major LE action on callers specifically)','');
      if (disp.length > 28) disp = disp.substring(0,26) + '...';
      return `<td class="${cls}" title="${v}">${disp}</td>`;
    });
    html += `<tr onclick="selectMod(${m.id})">
      <td class="mod-cell">${String(m.id).padStart(2,'0')} ${m.name}</td>
      ${cells.join('')}
    </tr>`;
  });

  html += '</tbody></table>';
  mv.innerHTML = html;
}
