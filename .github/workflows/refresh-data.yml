name: Refresh intelligence data

on:
  schedule:
    - cron: '0 */8 * * *'   # Every 8 hours: 00:00, 08:00, 16:00 UTC
  workflow_dispatch:          # Allow manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write         # Needed to commit updated data files back to repo

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install feedparser requests

      # -------------------------------------------------------
      # ransomware.live - fetch victims by month, filter by group
      # Uses the same public API approach as the live intel page.
      # -------------------------------------------------------
      - name: Pull ransomware.live victim data by group
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, datetime, pathlib

          BASE   = 'https://api.ransomware.live/v2'
          # Keys are ransomware.live group slugs; values are the output filename (without .json)
          # chaos is the current active iteration of the Royal/BlackSuit/Chaos lineage
          GROUPS = {
              'lynx':        'lynx',
              'qilin':       'qilin',
              'akira':       'akira',
              'lockbit':     'lockbit',
              'dragonforce': 'dragonforce',
              'conti':       'conti',
              'clop':             'clop',
              'chaos':            'royal',
              'SilentRansomGroup': 'silentransom',
          }

          # Fetch last 6 months of victim data
          all_victims = []
          now = datetime.datetime.utcnow()
          for i in range(6):
              month_date = (now.replace(day=1) - datetime.timedelta(days=i * 28))
              url = f"{BASE}/victims/{month_date.year}/{month_date.month}"
              try:
                  req = urllib.request.Request(url, headers={'Accept': 'application/json', 'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=15) as r:
                      data = json.loads(r.read())
                      if isinstance(data, list):
                          all_victims.extend(data)
                          print(f"  {month_date.year}/{month_date.month}: {len(data)} victims")
              except Exception as e:
                  print(f"  Warning {url}: {e}")

          # Deduplicate
          seen = set()
          unique = []
          for v in all_victims:
              key = str(v.get('victim','')) + str(v.get('group','')) + str(v.get('attackdate',''))
              if key not in seen:
                  seen.add(key)
                  unique.append(v)
          print(f"Total unique victims across all groups: {len(unique)}")

          # Write per-group JSON files
          for slug, filename in GROUPS.items():
              items = [v for v in unique if (v.get('group') or '').lower() == slug.lower()]
              items.sort(key=lambda x: x.get('attackdate', ''), reverse=True)
              pathlib.Path(f'groups/data/{filename}.json').write_text(
                  json.dumps(items, indent=2, ensure_ascii=False)
              )
              print(f"  {slug} -> {filename}.json: {len(items)} victims")
          PYEOF

      # -------------------------------------------------------
      # TI blog RSS feed parser - recent articles per group
      # -------------------------------------------------------
      - name: Parse TI blog RSS feeds
        run: python3 scripts/fetch_ti_feeds.py

      # -------------------------------------------------------
      # Timestamp file - tells the HTML when data was last refreshed
      # -------------------------------------------------------
      - name: Write last-updated timestamp
        run: |
          echo "{\"updated\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > groups/data/last-updated.json

      # -------------------------------------------------------
      # Commit updated data files back to the repo
      # GitHub Pages will serve the new JSON within minutes
      # -------------------------------------------------------
      - name: Commit and push data updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add groups/data/
          git diff --staged --quiet \
            || git commit -m "Auto: data refresh $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
